name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - "@frameforge/shared"
          - "@frameforge/api"
          - "@frameforge/worker"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run --workspace @frameforge/shared build
      - run: npm run --workspace ${{ matrix.workspace }} test -- --coverage --coverageReporters=text-summary

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]
    strategy:
      matrix:
        workspace:
          - "@frameforge/shared"
          - "@frameforge/api"
          - "@frameforge/worker"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run --workspace @frameforge/shared build
        if: matrix.workspace != '@frameforge/shared'
      - run: npm run --workspace ${{ matrix.workspace }} build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install libvips for Sharp
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips42 && sudo rm -rf /var/lib/apt/lists/*
      - run: npm ci
      - run: npm run --workspace @frameforge/shared build
      - run: npm run --workspace @frameforge/api build
      - run: npm run --workspace @frameforge/worker build
      - run: docker compose up -d
      - name: Wait for infrastructure services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U frameforge > /dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for RabbitMQ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:15672 > /dev/null 2>&1; then
              echo "RabbitMQ is ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for MinIO..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            sleep 2
          done
      - run: cp .env.example .env
      - run: |
          env $(cat .env | grep -v '^#' | grep -v '^$' | xargs) npm run --workspace @frameforge/api start > /tmp/api.log 2>&1 &
          env $(cat .env | grep -v '^#' | grep -v '^$' | xargs) METRICS_PORT=9091 npm run --workspace @frameforge/worker start > /tmp/worker.log 2>&1 &
      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "=== API logs ==="
          cat /tmp/api.log || true
          echo "=== Worker logs ==="
          cat /tmp/worker.log || true
          echo "API did not become ready in time"
          exit 1
      - run: cd e2e && npm ci && npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [build, security-audit]
    strategy:
      matrix:
        service: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f apps/${{ matrix.service }}/Dockerfile -t frameforge-${{ matrix.service }}:ci .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frameforge-${{ matrix.service }}:ci
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
        continue-on-error: true
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
        continue-on-error: true
