apiVersion: v1
kind: Service
metadata:
  name: {{ include "frameforge.fullname" . }}-api
  labels:
    {{- include "frameforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: {{ .Values.service.api.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "frameforge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api