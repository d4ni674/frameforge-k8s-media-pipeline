apiVersion: v1
kind: Service
metadata:
  name: frameforge-api
  namespace: frameforge
  labels:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: frameforge-worker-metrics
  namespace: frameforge
  labels:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: worker
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frameforge-api
  namespace: frameforge
  labels:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frameforge
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frameforge-worker
  namespace: frameforge
  labels:
    app.kubernetes.io/name: frameforge
    app.kubernetes.io/component: worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frameforge
      app.kubernetes.io/component: worker
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s