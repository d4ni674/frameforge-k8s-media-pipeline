apiVersion: v1
kind: ConfigMap
metadata:
  name: frameforge-grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  frameforge-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Queue Depth",
          "type": "stat",
          "targets": [
            {
              "expr": "rabbitmq_queue_messages{queue=\"media.jobs\"}",
              "legendFormat": "Main Queue"
            },
            {
              "expr": "rabbitmq_queue_messages{queue=\"media.jobs.retry\"}",
              "legendFormat": "Retry Queue"
            },
            {
              "expr": "rabbitmq_queue_messages{queue=\"media.jobs.dlq\"}",
              "legendFormat": "Dead Letter Queue"
            }
          ],
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 }
        },
        {
          "title": "Jobs Created",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(frameforge_jobs_created_total[5m])",
              "legendFormat": "{{media_type}}/{{profile}}"
            }
          ],
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 }
        },
        {
          "title": "Jobs Completed vs Failed",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(frameforge_jobs_completed_total[5m])",
              "legendFormat": "completed {{media_type}}/{{profile}}"
            },
            {
              "expr": "rate(frameforge_jobs_failed_total[5m])",
              "legendFormat": "failed {{media_type}}"
            }
          ],
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 }
        },
        {
          "title": "Processing Duration (p50, p95, p99)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(frameforge_job_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(frameforge_job_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(frameforge_job_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "p99"
            }
          ],
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 }
        },
        {
          "title": "Worker Replica Count",
          "type": "stat",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas{deployment=~\".*-worker\"}",
              "legendFormat": "replicas"
            }
          ],
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 8 }
        },
        {
          "title": "Upload Failure Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(frameforge_upload_failures_total[5m])",
              "legendFormat": "{{reason}}"
            }
          ],
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 8 }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["frameforge"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "FrameForge Overview"
    }
