apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: frameforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: frameforge
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frameforge-secrets
                  key: PG_PASSWORD
            - name: POSTGRES_DB
              value: frameforge
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: frameforge
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432