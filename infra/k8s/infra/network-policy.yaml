apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frameforge-default-deny
  namespace: frameforge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frameforge-api-ingress
  namespace: frameforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frameforge
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frameforge-worker-egress
  namespace: frameforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frameforge
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
