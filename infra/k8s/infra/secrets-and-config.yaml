apiVersion: v1
kind: Secret
metadata:
  name: frameforge-secrets
  namespace: frameforge
type: Opaque
data:
  # Base64-encoded defaults for local development (kind).
  # Production: override with --set or external secrets management.
  # echo -n 'frameforge' | base64 → ZnJhbWVmb3JnZQ==
  PG_PASSWORD: ZnJhbWVmb3JnZQ==
  # echo -n 'minioadmin' | base64 → bWluaW9hZG1pbg==
  MINIO_ACCESS_KEY: bWluaW9hZG1pbg==
  # echo -n 'minioadmin123' | base64 → bWluaW9hZG1pbjEyMw==
  MINIO_SECRET_KEY: bWluaW9hZG1pbjEyMw==
  # echo -n 'frameforge' | base64 → ZnJhbWVmb3JnZQ==
  RABBITMQ_PASSWORD: ZnJhbWVmb3JnZQ==
  # echo -n 'amqp://frameforge:frameforge@rabbitmq.frameforge.svc.cluster.local:5672' | base64
  RABBITMQ_URL: YW1xcDovL2ZyYW1lZm9yZ2U6ZnJhbWVmb3JnZUByYWJiaXRtcS5mcmFtZWZvcmdlLnN2Yy5jbHVzdGVyLmxvY2FsOjU2NzI=
  # API_KEY is empty by default (auth disabled). Set a strong key for production.
  # echo -n '' | base64 → AA==
  API_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frameforge-config
  namespace: frameforge
data:
  PG_HOST: postgres.frameforge.svc.cluster.local
  PG_PORT: "5432"
  PG_USER: frameforge
  PG_DATABASE: frameforge
  MINIO_ENDPOINT: minio.frameforge.svc.cluster.local
  MINIO_PORT: "9000"
  MINIO_BUCKET: frameforge
  MINIO_USE_SSL: "false"
  RABBITMQ_HOST: rabbitmq.frameforge.svc.cluster.local
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: frameforge
  CORS_ORIGINS: "*"
  THROTTLE_TTL: "60000"
  THROTTLE_LIMIT: "100"
