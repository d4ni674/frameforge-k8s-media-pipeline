apiVersion: v1
kind: Secret
metadata:
  name: frameforge-secrets
  namespace: frameforge
type: Opaque
stringData:
  # Default credentials for local development (kind).
  # Replace with strong secrets before deploying to production.
  PG_PASSWORD: "frameforge"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin123"
  RABBITMQ_PASSWORD: "frameforge"
  RABBITMQ_URL: "amqp://frameforge:frameforge@rabbitmq.frameforge.svc.cluster.local:5672"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frameforge-config
  namespace: frameforge
data:
  PG_HOST: postgres.frameforge.svc.cluster.local
  PG_PORT: "5432"
  PG_USER: frameforge
  PG_DATABASE: frameforge
  MINIO_ENDPOINT: minio.frameforge.svc.cluster.local
  MINIO_PORT: "9000"
  MINIO_BUCKET: frameforge
  MINIO_USE_SSL: "false"
  RABBITMQ_HOST: rabbitmq.frameforge.svc.cluster.local
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: frameforge
