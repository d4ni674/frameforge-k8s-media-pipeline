apiVersion: v1
kind: Secret
metadata:
  name: frameforge-secrets
  namespace: frameforge
type: Opaque
stringData:
  # SECURITY WARNING: These are placeholder values for local development only.
  # Generate strong secrets before deploying to production.
  PG_PASSWORD: "<CHANGE_ME>"
  MINIO_ACCESS_KEY: "<CHANGE_ME>"
  MINIO_SECRET_KEY: "<CHANGE_ME>"
  RABBITMQ_PASSWORD: "<CHANGE_ME>"
  # Constructed from ConfigMap values + secret above
  RABBITMQ_URL: "amqp://frameforge:<CHANGE_ME>@rabbitmq.frameforge.svc.cluster.local:5672"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frameforge-config
  namespace: frameforge
data:
  PG_HOST: postgres.frameforge.svc.cluster.local
  PG_PORT: "5432"
  PG_USER: frameforge
  PG_DATABASE: frameforge
  MINIO_ENDPOINT: minio.frameforge.svc.cluster.local
  MINIO_PORT: "9000"
  MINIO_BUCKET: frameforge
  MINIO_USE_SSL: "false"
  RABBITMQ_HOST: rabbitmq.frameforge.svc.cluster.local
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: frameforge